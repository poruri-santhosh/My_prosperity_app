<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analytics | Pulse of Prosperity</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script src="https://public.tableau.com/javascripts/api/viz_v1.js"></script>
</head>

<body class="bg-[#020617] text-slate-100 flex overflow-hidden">

<!-- Sidebar -->
<aside class="w-72 h-screen border-r border-slate-800 bg-slate-900/50 backdrop-blur-xl flex flex-col p-6 hidden lg:flex">
    <div class="mb-10 font-black tracking-tighter text-xl uppercase">Analytics</div>
    <nav class="space-y-2 flex-1">
        <a href="#market">Market Status</a>
        <a href="#stability">Stability Index</a>
        <a href="#rankings">Global Rankings</a>
    </nav>
    <a href="{{ url_for('index') }}" class="text-slate-400 hover:text-white text-sm mt-auto">
        Return Home
    </a>
</aside>
<!-- Main Content -->
<main class="flex-1 h-screen overflow-y-auto p-8 space-y-24">

<header>
    <h1 class="text-4xl font-black text-gradient italic">Command Center</h1>
</header>

<!-- ================= MARKET ================= -->
<section id="market" class="space-y-8">
    <h2 class="text-2xl font-bold italic">01 // Market Status</h2>

    <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">

        <!-- GDP vs Monetary -->
        <div class="dashboard-card h-[500px] p-4">
            <div class='tableauPlaceholder' style='width:100%; height:100%;'>
                <object class='tableauViz' style='display:none;'>
                    <param name='host_url' value='https://public.tableau.com/' />
                    <param name='embed_code_version' value='3' />
                    <param name='name' value='CorrelationbetweenGDPPPPandmonetaryFreedom/Sheet8' />
                    <param name='tabs' value='no' />
                    <param name='toolbar' value='yes' />
                </object>
            </div>
        </div>

        <!-- Financial Freedom -->
        <div class="dashboard-card h-[500px] p-4">
            <div class='tableauPlaceholder' style='width:100%; height:100%;'>
                <object class='tableauViz' style='display:none;'>
                    <param name='host_url' value='https://public.tableau.com/' />
                    <param name='embed_code_version' value='3' />
                    <param name='name' value='Indexscorebasedonfinancialfreedom_17506943710920/Sheet3' />
                    <param name='tabs' value='no' />
                    <param name='toolbar' value='yes' />
                </object>
            </div>
        </div>

    </div>
</section>

<!-- ================= STABILITY ================= -->
<section id="stability" class="space-y-8">
    <h2 class="text-2xl font-bold italic">02 // Stability Index</h2>

    <!-- Inflation vs Unemployment -->
    <div class="dashboard-card h-[600px] p-4">
        <div class='tableauPlaceholder' style='width:100%; height:100%;'>
            <object class='tableauViz' style='display:none;'>
                <param name='host_url' value='https://public.tableau.com/' />
                <param name='embed_code_version' value='3' />
                <param name='name' value='CorrelationbetweenInflationandUnemployement_17506956679970/Sheet7' />
                <param name='tabs' value='no' />
                <param name='toolbar' value='yes' />
            </object>
        </div>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">

        <!-- Inflation Rate -->
        <div class="dashboard-card h-[500px] p-4">
            <div class='tableauPlaceholder' style='width:100%; height:100%;'>
                <object class='tableauViz' style='display:none;'>
                    <param name='host_url' value='https://public.tableau.com/' />
                    <param name='embed_code_version' value='3' />
                    <param name='name' value='InflationrateindifferentCountries/Sheet6' />
                    <param name='tabs' value='no' />
                    <param name='toolbar' value='yes' />
                </object>
            </div>
        </div>

        <!-- Population Index -->
        <div class="dashboard-card h-[500px] p-4">
            <div class='tableauPlaceholder' style='width:100%; height:100%;'>
                <object class='tableauViz' style='display:none;'>
                    <param name='host_url' value='https://public.tableau.com/' />
                    <param name='embed_code_version' value='3' />
                    <param name='name' value='IndexscorebasedonPopulation_17506947688380/Sheet4' />
                    <param name='tabs' value='no' />
                    <param name='toolbar' value='yes' />
                </object>
            </div>
        </div>

    </div>
</section>

<!-- ================= RANKINGS ================= -->
<section id="rankings" class="space-y-8">
    <h2 class="text-2xl font-bold italic">03 // Global Rankings</h2>

    <!-- Main Ranking Dashboard -->
    <div class="dashboard-card h-[700px] p-4">
        <div class='tableauPlaceholder' style='width:100%; height:100%;'>
            <object class='tableauViz' style='display:none;'>
                <param name='host_url' value='https://public.tableau.com/' />
                <param name='embed_code_version' value='3' />
                <param name='name' value='Dashboard1_17507032771270/Dashboard1' />
                <param name='tabs' value='no' />
                <param name='toolbar' value='yes' />
            </object>
        </div>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">

        <!-- Top 40 -->
        <div class="dashboard-card h-[500px] p-4">
            <div class='tableauPlaceholder' style='width:100%; height:100%;'>
                <object class='tableauViz' style='display:none;'>
                    <param name='host_url' value='https://public.tableau.com/' />
                    <param name='embed_code_version' value='3' />
                    <param name='name' value='Top40rankingcountries/Sheet11' />
                    <param name='tabs' value='no' />
                    <param name='toolbar' value='yes' />
                </object>
            </div>
        </div>

        <!-- Bottom Ranking -->
        <div class="dashboard-card h-[500px] p-4">
            <div class='tableauPlaceholder' style='width:100%; height:100%;'>
                <object class='tableauViz' style='display:none;'>
                    <param name='host_url' value='https://public.tableau.com/' />
                    <param name='embed_code_version' value='3' />
                    <param name='name' value='bottomrankingcountries/Sheet1' />
                    <param name='tabs' value='no' />
                    <param name='toolbar' value='yes' />
                </object>
            </div>
        </div>

    </div>
</section>

</main>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
