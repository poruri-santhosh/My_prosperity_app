<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse of Prosperity | Global Stories</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-[#020617]">
    <nav class="fixed top-6 left-1/2 -translate-x-1/2 w-[90%] max-w-4xl z-50 glass-panel px-8 py-4 flex justify-between items-center">
        <div class="font-extrabold text-xl tracking-tighter text-white">PULSE<span class="text-blue-500">PRO</span></div>
        <div class="flex gap-8 text-sm font-semibold uppercase tracking-widest text-slate-400">
    <a href="{{ url_for('index') }}" class="text-blue-400">Story</a>
    <a href="{{ url_for('analytics') }}" class="hover:text-white transition">Analytics</a>
    <a href="{{ url_for('methodology') }}" class="hover:text-white transition">Tech</a>
</div>
    </nav>

    <header class="h-screen flex flex-col justify-center items-center text-center px-6">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-blue-900/20 via-transparent to-transparent -z-10"></div>
        <h1 class="text-6xl md:text-8xl font-black mb-6 text-gradient">Global Prosperity</h1>
        <p class="max-w-2xl text-slate-400 text-lg mb-12">Visualizing the 2022 Economic Freedom Index through advanced computational analytics.</p>
        <a href="#viz" class="p-4 bg-blue-600 rounded-full hover:bg-blue-500 transition-all px-10 font-bold text-white shadow-lg shadow-blue-500/20">Explore Data</a>
    </header>

    <main id="viz" class="max-w-7xl mx-auto px-6 pb-24 space-y-20">
        <div class="dashboard-card overflow-hidden" style="height: 800px;">
            <div class="skeleton-overlay absolute inset-0 z-20 flex items-center justify-center bg-slate-900">
                <div class="loader"></div>
            </div>
            <div class='tableauPlaceholder' id='viz_story_1'>
                <object class='tableauViz' style='display:none;'>
                    <param name='name' value='Story1_17510090626760/Story1' />
                    <param name='toolbar' value='no' />
                </object>
            </div>
        </div>

        <div class="dashboard-card overflow-hidden" style="height: 1200px;">
            <div class="skeleton-overlay absolute inset-0 z-20 flex items-center justify-center bg-slate-900">
                <div class="loader"></div>
            </div>
            <div class='tableauPlaceholder' id='viz1771438566705'>
                <object class='tableauViz' style='display:none;'>
                    <param name='name' value='Story_17507060555860/Story1' />
                    <param name='toolbar' value='yes' />
                </object>
            </div>
        </div>
        
    </main>
    <script src="https://public.tableau.com/javascripts/api/viz_v1.js"></script>

<script>
    // Quick fix to hide the loader once the page loads
    window.onload = function() {
        document.querySelectorAll('.skeleton-overlay').forEach(el => {
            el.style.display = 'none';
        });
    };
</script>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
